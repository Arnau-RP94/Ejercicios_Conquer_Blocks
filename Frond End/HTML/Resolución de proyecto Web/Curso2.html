            <h2>Curso de ciberseguridad</h2>
            <br>
        </header>

        <main>
            <section>
                <article>
                    <figure>
                        <p>
                            La ciberseguridad no es solo un conjunto de herramientas o protocolos; es una cultura. Una forma de pensar que combina vigilancia, prevención y resiliencia. Cada correo electrónico que llega a una bandeja de entrada, cada acceso a una red interna, cada descarga de software pasa por filtros invisibles diseñados para detectar amenazas antes de que se materialicen. 
                            Detrás de esos sistemas automáticos hay equipos humanos, expertos que analizan patrones, responden a incidentes y anticipan movimientos de atacantes que nunca dejan de innovar.
                        </p>
